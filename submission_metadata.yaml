ai_usage_summary: |
  Used Claude and Deekseek for architectural discussion, code review, and debugging.
  No candidate data was sent to any AI service.

methodology_summary: |
  Five-component weighted ranker: 
  - Semantic similarity (sentence-transformers embeddings)
  - Career trajectory (product vs services, ML role fit, YoE, tenure stability)
  - Trust-adjusted skill coverage (endorsements, duration, assessment scores)
  - Behavioral signals (availability, engagement, credibility)
  - Location preference (Pune/Noida/Hyd)
  Honeypot detection filters temporal/salary anomalies. All rules are precomputed; ranking runs in <2 min.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true